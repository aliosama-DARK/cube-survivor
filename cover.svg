<svg xmlns="http://www.w3.org/2000/svg" width="630" height="500" viewBox="0 0 630 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16273B"/>
      <stop offset="0.55" stop-color="#0E1A2A"/>
      <stop offset="1" stop-color="#0A0F18"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FD3FF"/>
      <stop offset="1" stop-color="#4FA0FF"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2F7BFF"/>
      <stop offset="1" stop-color="#1E56C0"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#245FCE"/>
      <stop offset="1" stop-color="#173F8C"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2F7BFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2F7BFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="630" height="500" fill="url(#bg)"/>

  <!-- faint arena grid -->
  <g stroke="#2F7BFF" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="125" x2="630" y2="125"/>
    <line x1="0" y1="250" x2="630" y2="250"/>
    <line x1="0" y1="375" x2="630" y2="375"/>
    <line x1="126" y1="0" x2="126" y2="500"/>
    <line x1="252" y1="0" x2="252" y2="500"/>
    <line x1="378" y1="0" x2="378" y2="500"/>
    <line x1="504" y1="0" x2="504" y2="500"/>
  </g>

  <!-- swarm accents: red danger dots + gold gems around the arena -->
  <g fill="#E84A5F">
    <rect x="70" y="90" width="18" height="18" rx="4"/>
    <rect x="540" y="120" width="16" height="16" rx="4"/>
    <rect x="90" y="300" width="15" height="15" rx="4"/>
    <rect x="520" y="300" width="18" height="18" rx="4"/>
    <circle cx="150" cy="200" r="9"/>
    <circle cx="480" cy="210" r="8"/>
  </g>
  <g fill="#F0894A">
    <circle cx="200" cy="120" r="7"/>
    <circle cx="440" cy="130" r="6"/>
  </g>
  <g>
    <g transform="translate(120 250)"><path d="M0 -9 L8 0 L0 9 L-8 0 Z" fill="#FFD166"/></g>
    <g transform="translate(510 255)"><path d="M0 -9 L8 0 L0 9 L-8 0 Z" fill="#FFD166"/></g>
    <g transform="translate(250 90)"><path d="M0 -7 L6 0 L0 7 L-6 0 Z" fill="#FFD166"/></g>
  </g>

  <!-- player glow + orbiting shots -->
  <circle cx="315" cy="200" r="130" fill="url(#glow)"/>
  <g fill="#2F7BFF" stroke="#0A0F18" stroke-width="2">
    <rect x="228" y="192" width="15" height="15" rx="3" transform="rotate(45 235 199)"/>
    <rect x="388" y="150" width="15" height="15" rx="3" transform="rotate(45 395 157)"/>
    <rect x="400" y="235" width="15" height="15" rx="3" transform="rotate(45 407 242)"/>
    <rect x="255" y="115" width="13" height="13" rx="3" transform="rotate(45 261 121)"/>
  </g>

  <!-- hero player cube (focal point) -->
  <g stroke="#0A0F18" stroke-width="3" stroke-linejoin="round" transform="translate(0 -6)">
    <path d="M315 120 L385 160 L315 200 L245 160 Z" fill="url(#cubeTop)"/>
    <path d="M245 160 L315 200 L315 275 L245 235 Z" fill="url(#cubeLeft)"/>
    <path d="M385 160 L315 200 L315 275 L385 235 Z" fill="url(#cubeRight)"/>
  </g>
  <path d="M315 128 L372 160 L315 192" fill="none" stroke="#CDEBFF" stroke-width="3" stroke-opacity="0.75" stroke-linejoin="round" stroke-linecap="round" transform="translate(0 -6)"/>

  <rect width="630" height="500" fill="url(#vig)"/>

  <!-- title -->
  <text x="315" y="360" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="62" fill="#FFFFFF" letter-spacing="1">CUBE</text>
  <text x="315" y="422" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="62" fill="#2F7BFF" letter-spacing="1">SURVIVOR</text>
  <text x="315" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#FFD166" letter-spacing="3">SURVIVE THE CORRUPTED ARENA</text>
</svg>
